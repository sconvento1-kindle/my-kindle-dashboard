name: Generate Kindle Calendar Dashboard

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *' # Refreshes every single hour automatically

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Fonts & Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-liberation
        pip install Pillow requests icalendar

    - name: Run Dashboard Generator
      env:
        WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        CALENDAR_ICAL_URL: ${{ secrets.CALENDAR_ICAL_URL }}
      run: python generate.py

    - name: Commit and Push Updated Image
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add dashboard.png
        git commit -m "Automated dashboard image update" || echo "No changes to commit"
        git push
