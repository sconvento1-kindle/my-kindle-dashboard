name: Generate Kindle Calendar Dashboard

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'  # Runs automatically every hour

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Upgraded to fix deprecation warning

      - name: Set up Python
        uses: actions/setup-python@v5 # Upgraded to fix deprecation warning
        with:
          python-version: '3.10' # Fixed the configuration typo

      - name: Install Dependencies
        run: |
          pip install Pillow requests icalevents

      - name: Run Dashboard Generator
        run: python generate.py
        env:
          CALENDAR_URL: ${{ secrets.CALENDAR_URL }}

      - name: Commit and Push Image
        run: |
          git config --global user.name "Dashboard Bot"
          git config --global user.email "bot@github.com"
          git add dashboard.png
          git commit -m "Update Dashboard Image" || exit 0
          git push
