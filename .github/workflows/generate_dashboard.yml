name: Generate Kindle Dashboard

on:
  schedule:
    - cron: '*/30 * * * *' # Gira ogni 30 minuti
  workflow_dispatch: # Ti permette di avviarlo manualmente con un click da GitHub

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: Ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install Pillow requests google-auth google-auth-oauthlib google-api-python-client

      - name: Run Generator Script
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          # Inserisci qui le tue chiavi del meteo o credenziali come GitHub Secrets
        run: python generate.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output # Lo script salverà l'immagine qui
          force_orphan: true # Sovrascrive la cronologia mantenendo il file leggero ed evitando lag di aggiornamento
